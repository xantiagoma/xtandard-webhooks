name: Release

# Publishes to npm when a version tag is pushed (e.g. v0.1.0).
#
# Release flow (manual, proven in the flags repo): bump version with `npm pkg
# set version=X`, prepend the CHANGELOG entry, commit `chore(release): vX`,
# tag `vX`, push main FIRST and the tag second — the tag push triggers this
# workflow.
#
# Requires the NPM_TOKEN secret: an npm automation token with publish rights to
# the @xtandard scope.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify package
        run: bunx publint

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Turn the pushed tag into a GitHub Release (shown on /releases) with notes
      # auto-generated from the commits since the previous tag.
      - name: Create or publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} exists — publishing it."
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
