name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/standalone/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build local image
        run: docker build -f apps/standalone/Dockerfile -t webhooks-smoke .
      - name: Run and probe /healthcheck
        run: |
          docker run -d --rm -p 3000:3000 -e AUTH_MODE=none --name webhooks webhooks-smoke
          for i in $(seq 1 30); do
            if curl -sf localhost:3000/healthcheck; then echo "OK"; break; fi
            sleep 1
          done
          curl -sf localhost:3000/healthcheck
          curl -sf -o /dev/null localhost:3000/
          docker stop webhooks
